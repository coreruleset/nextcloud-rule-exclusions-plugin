            Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
            Content-Type: application/json
          port: 80
          method: POST
          uri: /apps/files_external/globalcredentials
          data: |-
            {"uid":"","user":"test","password":"<script>"}
          version: HTTP/1.1
        output:
          log:
            no_expect_ids:
              - 920273
              - 941100
