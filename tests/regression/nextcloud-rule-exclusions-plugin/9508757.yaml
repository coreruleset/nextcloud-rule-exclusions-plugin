---
meta:
  author: "Esad Cetiner"
  description: "Nextcloud Rule Exclusions Plugin: Nextcloud Talk"
rule_id: 9508757
tests:
  - test_id: 1
    desc: Sending an message in an room via an bot
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Host: localhost
            User-Agent: OWASP CRS test agent
            Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
            Content-Type: application/json
          port: 80
          method: POST
          uri: /ocs/v2.php/apps/spreed/api/v1/bot/1234/message
          data: '{ "message": "<script>" }'
          version: HTTP/1.1
        output:
          log:
            no_expect_ids:
              - 920273
              - 941110
