---
meta:
  author: "Esad Cetiner"
  description: "Nextcloud Mail: Viewing an email"
rule_id: 9508992
tests:
  - test_id: 1
    desc: Allow any response body when viewing an email
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Host: localhost
            User-Agent: OWASP CRS test agent
            Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
            Content-Type: application/json
          port: 80
          method: POST
          uri: /configure_reflection
          data: |-
            { "endpoints": [{"method": "GET", "url": "/apps/mail/api/messages/1/html"}], "body": "SqlException" }
          version: HTTP/1.1
      - input:
          dest_addr: 127.0.0.1
          headers:
            Host: localhost
            User-Agent: OWASP CRS test agent
            Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
          port: 80
          method: GET
          uri: /apps/mail/api/messages/1/html
          version: HTTP/1.1
        output:
          log:
            no_match_regex: \[id "\d+"\]
      - input:
          dest_addr: 127.0.0.1
          headers:
            Host: localhost
            User-Agent: OWASP CRS test agent
            Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
            Content-Type: application/json
          port: 80
          method: PUT
          uri: /reset
          version: HTTP/1.1
